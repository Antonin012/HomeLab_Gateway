global:
  scrape_interval: 15s  # Frequency of metric scraping

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'debian-server'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'fail2ban'
    static_configs:
      - targets: ['fail2ban-exporter:9121']
